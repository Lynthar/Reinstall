name: shellcheck
on:
  push:
    paths:
      - "**.sh"
      - "fix-eth-name.initd"
      - ".github/workflows/shellcheck.yml"
  pull_request:
    paths:
      - "**.sh"
      - "fix-eth-name.initd"
      - ".github/workflows/shellcheck.yml"
jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          shellcheck reinstall.sh
          shellcheck trans.sh
          shellcheck initrd-network.sh
          shellcheck fix-eth-name.sh
          shellcheck cloud-init-fix-onlink.sh
          shellcheck get-xda.sh
          shellcheck ttys.sh
          shellcheck resize.sh
          shellcheck fix-eth-name.initd
